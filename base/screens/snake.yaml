# Snake - optional carousel screen (base id 9). Grid snake steered by the knob.
# Remove it: drop this file from your config's package "files:" list. Nothing else to edit.
# Scores (g_sn_top / g_sn_best) + the "Reset scores" settings action live here - fully self-contained.
#
# This file is generated by scripts/gen_snake.py (the 48-segment body pool, the fruit rotation
# and their per-move updates are repetitive). Edit the generator, not the blocks.

esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: 'id(g_present)[9] = true;'   # register after clock/player/timer/cars/space
    # Settings (Settings -> Widgets -> Snake -> Reset scores) + factory-reset handling.
    - priority: 650
      then:
        - lambda: |-
            int g = id(g_wgrp_n)++;
            id(g_wgrp_labels) += (g ? "\n" : ""); id(g_wgrp_labels) += "Snake";
            int o = id(g_wopt_n)++;
            id(g_wopt_group)[o] = g; id(g_wopt_label)[o] = "Reset scores"; id(g_wopt_kind)[o] = 1; id(g_wopt_ptr)[o] = &id(g_sn_reset);

globals:
  # --- scores (persistent) + reset flag, owned by this package ---
  - id: g_sn_best
    type: int
    restore_value: yes
    initial_value: '0'
  - id: g_sn_top
    type: int[10]
    restore_value: yes
  - id: g_sn_reset    # Widgets "Reset scores" sets this; the watcher below clears the scores
    type: bool
    restore_value: no
    initial_value: 'false'
  # --- Snake game (page_snake, g_base==9) ---
  - id: g_sn_state    # 0=menu 1=playing 2=game over 3=how-to 4=scores
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_dir      # heading: 0=up 1=right 2=down 3=left
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_len      # current snake length (number of live segments)
    type: int
    restore_value: no
    initial_value: '3'
  - id: g_sn_score
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_x        # body cell columns (0..23); [0] = head
    type: int[48]
    restore_value: no
  - id: g_sn_y        # body cell rows
    type: int[48]
    restore_value: no
  - id: g_sn_fx       # food cell
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_fy
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_fi       # which fruit sprite is on the board (0..11)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_sk_on    # skull hazard currently visible
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_sn_sk_x     # skull cell
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_sk_y
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_sk_clk   # 50ms-tick clock for skull spawn/lifetime (counts only while playing)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_acc      # sub-tick accumulator (50ms ticks); a move happens every g_sn_period ticks
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_period   # ticks between moves (lower = faster); starts 4 (200ms), min 2 (100ms)
    type: int
    restore_value: no
    initial_value: '4'
  - id: g_sn_dead     # set by the move lambda on wall/self/skull hit
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_sn_need_food  # set by the move lambda when an apple was eaten -> respawn after
    type: bool
    restore_value: no
    initial_value: 'false'

script:
  # Pick which fruit sprite is shown for the current food.
  - id: sn_food_sprite
    then:
      - if: { condition: { lambda: 'return id(g_sn_fi) == 0;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit0 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 1;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit1 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 2;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit2 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 3;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit3 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 4;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit4 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 5;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit5 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 6;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit6 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 7;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit7 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 8;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit8 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 9;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit9 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 10;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit10 } ] }
      - if: { condition: { lambda: 'return id(g_sn_fi) == 11;' }, then: [ lvgl.image.update: { id: sn_food, src: img_sn_fruit11 } ] }
  # Place an apple on a random free cell (not under the snake or the skull) + pick a fruit.
  - id: sn_place_food
    then:
      - lambda: |-
          bool ok = false; int fx = 0, fy = 0, tries = 0;
          while (!ok && tries < 600) {
            fx = esp_random() % 24; fy = esp_random() % 24; tries++;
            ok = true;
            if (id(g_sn_sk_on) && fx == id(g_sn_sk_x) && fy == id(g_sn_sk_y)) ok = false;
            if (ok) for (int i = 0; i < id(g_sn_len); i++)
              if (id(g_sn_x)[i] == fx && id(g_sn_y)[i] == fy) { ok = false; break; }
          }
          id(g_sn_fx) = fx; id(g_sn_fy) = fy;
          id(g_sn_fi) = esp_random() % 12;
      - script.execute: sn_food_sprite
  # Skull hazard: appears on a free cell, vanishes after a while; eating it ends the game.
  - id: sn_spawn_skull
    then:
      - lambda: |-
          bool ok = false; int sx = 0, sy = 0, tries = 0;
          while (!ok && tries < 600) {
            sx = esp_random() % 24; sy = esp_random() % 24; tries++;
            ok = !(sx == id(g_sn_fx) && sy == id(g_sn_fy));
            if (ok) for (int i = 0; i < id(g_sn_len); i++)
              if (id(g_sn_x)[i] == sx && id(g_sn_y)[i] == sy) { ok = false; break; }
          }
          id(g_sn_sk_x) = sx; id(g_sn_sk_y) = sy; id(g_sn_sk_on) = true; id(g_sn_sk_clk) = 0;
      - lvgl.widget.update:
          id: sn_skull
          hidden: false
          x: !lambda 'return id(g_sn_sk_x) * 10 - 115;'
          y: !lambda 'return id(g_sn_sk_y) * 10 - 115;'
  - id: sn_despawn_skull
    then:
      - lambda: 'id(g_sn_sk_on) = false; id(g_sn_sk_clk) = 0;'
      - lvgl.widget.hide: sn_skull
  # HUD: current score (top of the screen).
  - id: sn_hud
    then:
      - lvgl.label.update: { id: lbl_sn_score, text: !lambda 'char b[12]; snprintf(b,sizeof(b),"%d",id(g_sn_score)); return std::string(b);' }
  # Draw the apple + every body segment (visible ones placed, the rest hidden).
  - id: sn_draw
    then:
      - lvgl.widget.update:
          id: sn_food
          hidden: false
          x: !lambda 'return id(g_sn_fx) * 10 - 115;'
          y: !lambda 'return id(g_sn_fy) * 10 - 115;'
      - lvgl.widget.update:
          id: sn_s0
          hidden: !lambda 'return id(g_sn_len) <= 0;'
          x: !lambda 'return id(g_sn_x)[0] * 10 - 115;'
          y: !lambda 'return id(g_sn_y)[0] * 10 - 115;'
      - lvgl.widget.update:
          id: sn_s1
          hidden: !lambda 'return id(g_sn_len) <= 1;'
          x: !lambda 'return id(g_sn_x)[1] * 10 - 115;'
          y: !lambda 'return id(g_sn_y)[1] * 10 - 115;'
      - lvgl.widget.update:
