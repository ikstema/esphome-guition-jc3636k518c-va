# ============================================================================
# DEMO / EXAMPLE SCREEN  (base id 6, carousel name "demo")
# ----------------------------------------------------------------------------
# A minimal, heavily-commented screen that shows how a screen package is built:
#   * it registers itself in the carousel (g_present),
#   * it shows its own LVGL page,
#   * it reacts to a tap (toggles the background black <-> white, text inverts),
#   * it declares its OWN settings toggles (Settings -> Widgets -> Demo):
#         g_demo_border   -> draw a border
#         g_demo_haptic   -> drive the haptic motor (soft vs strong click)
#     The globals live in THIS file and are registered into the core's generic settings
#     registry (g_wgrp_* / g_wopt_*) in on_boot - see how below as the template.
#   * it drives the DRV2605 directly (a simple demo - bypasses haptic_update priority).
#
# Everything a screen needs lives in THIS file (globals/scripts/interval/lvgl page +
# its settings registration). Remove the screen by dropping this file from the package
# "files:" list - nothing else to edit, anywhere.
# ============================================================================

esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: 'id(g_present)[6] = true;'
    - priority: 650
      then:
        - lambda: |-
            int g = id(g_wgrp_n)++;
            id(g_wgrp_labels) += (g ? "\n" : ""); id(g_wgrp_labels) += "Demo";
            int o;
            o = id(g_wopt_n)++; id(g_wopt_group)[o] = g; id(g_wopt_label)[o] = "Border";    id(g_wopt_kind)[o] = 0; id(g_wopt_ptr)[o] = &id(g_demo_border);
            o = id(g_wopt_n)++; id(g_wopt_group)[o] = g; id(g_wopt_label)[o] = "Demo haptic"; id(g_wopt_kind)[o] = 0; id(g_wopt_ptr)[o] = &id(g_demo_haptic);

globals:
  - id: g_demo_bg
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_demo_border
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: g_demo_haptic
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: g_demo_lasttap
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_demo_haptic_on
    type: bool
    restore_value: yes
    initial_value: 'false'

script:
  - id: demo_render
    then:
      - if:
          condition: { lambda: 'return id(g_demo_bg);' }
          then:
            - lvgl.widget.update: { id: demo_bg,  bg_color: 0xFFFFFF, border_color: 0x000000 }
            - lvgl.label.update:  { id: demo_lbl, text_color: 0x000000 }
          else:
            - lvgl.widget.update: { id: demo_bg,  bg_color: 0x000000, border_color: 0xFFFFFF }
            - lvgl.label.update:  { id: demo_lbl, text_color: 0xFFFFFF }
      - lvgl.widget.update: { id: demo_bg, border_width: !lambda 'return id(g_demo_border) ? 6 : 0;' }
      - if:
          condition: { lambda: 'return id(g_demo_haptic);' }
          then:
            - if:
                condition: { lambda: 'return id(g_demo_bg);' }
                then:
                  - drv2605.play_effect:
                      id: haptic_driver
                      effect: 7
                else:
                  - drv2605.play_effect:
                      id: haptic_driver
                      effect: 1
            - lambda: 'id(g_demo_haptic_on) = true;'
          else:
            - if:
                condition: { lambda: 'return id(g_demo_haptic_on);' }
                then:
                  - drv2605.stop:
                      id: haptic_driver
                  - lambda: 'id(g_demo_haptic_on) = false;'

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==6;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_demo_lasttap) = id(g_tap_seq);'
            - if: { condition: { lambda: 'return id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_demo, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_demo, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_demo, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_demo, animation: move_bottom, time: 250ms }] }
            - script.execute: demo_render
  - interval: 80ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==6 && id(g_tap_seq) != id(g_demo_lasttap);' }
          then:
            - lambda: 'id(g_demo_lasttap) = id(g_tap_seq); id(g_demo_bg) = !id(g_demo_bg);'
            - script.execute: demo_render
      - if:
          condition: { lambda: 'return id(g_base) != 6 && id(g_demo_haptic_on);' }
          then:
            - drv2605.stop:
                id: haptic_driver
            - lambda: 'id(g_demo_haptic_on) = false;'

lvgl:
  pages:
    - id: page_demo
      bg_color: 0x000000
      widgets:
        - obj:
            id: demo_bg
            align: CENTER
            width: 360
            height: 360
            radius: 180
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 0
            border_color: 0xFFFFFF
        - label:
            id: demo_lbl
            align: CENTER
            text: "TAP ME!"
            text_font: montserrat_34
            text_color: 0xFFFFFF
